appId: com.nextwork.app
---
- launchApp
- tapOn:
    id: tab-chats
- assertVisible: Chats
- tapOn: ${CONVERSATION_TITLE}
- assertVisible:
    id: message-composer
# Manual step: long press a message bubble to open reactions.
- assertVisible: Message actions
- tapOn: Love
# Manual step: validate reaction chip appears on sender and receiver devices.
# Manual step: tap same reaction again to remove, then choose another reaction and verify realtime sync.
- assertVisible:
    id: message-send
