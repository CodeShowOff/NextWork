appId: com.workplace.mobile
---
- launchApp
- tapOn: Messages
- assertVisible: Messages
- tapOn: Sign out
- assertVisible: Messaging setup
- inputText: ${USER_A_ID}
- tapOn: Access token
- inputText: ${USER_A_TOKEN}
- tapOn: Save session
- assertVisible: Messages
- tapOn: ${CONVERSATION_TITLE}
- assertVisible: No messages yet. Say hi.
# Manual setup step: while User A app is backgrounded, send a message from User B to this conversation.
- pressKey: home
- launchApp
- tapOn: Messages
- tapOn: ${CONVERSATION_TITLE}
- assertVisible: ${USER_B_OFFLINE_MESSAGE}
