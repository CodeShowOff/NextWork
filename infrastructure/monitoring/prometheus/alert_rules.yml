groups:
  - name: nextwork-release-alerts
    rules:
      - alert: ApiErrorRateHigh
        expr: sum(rate(nextwork_http_errors_total[5m])) / clamp_min(sum(rate(nextwork_http_requests_total[5m])), 1) > 0.02
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: API 5xx error rate exceeded 2%
          description: Investigate backend errors and consider rollback.

      - alert: ApiP95LatencyHigh
        expr: max_over_time(nextwork_http_request_p95_duration_ms[5m]) > 1500
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: API p95 latency over 1.5s
          description: Core endpoint latency is above SLO.

      - alert: PostgresConnectionsHigh
        expr: pg_stat_activity_count > 120
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: PostgreSQL active connections are high
          description: Check DB pool sizing and long-running queries.

      - alert: RedisMemoryPressure
        expr: redis_memory_used_bytes / clamp_min(redis_total_system_memory_bytes, 1) > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Redis memory pressure over 80%
          description: Redis is approaching capacity.

      - alert: SocketConnectionsSurge
        expr: nextwork_websocket_active_connections > 2000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: WebSocket active connections surge
          description: Verify socket fanout, Redis adapter throughput, and pod scaling.
